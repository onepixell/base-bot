# Yarn Berry (v2+) configuration
# Use node-modules linker for compatibility with other package managers
nodeLinker: node-modules

# Enable workspace support
enableGlobalCache: false

# Compression level for PnP (not used with node-modules linker but kept for reference)
compressionLevel: mixed

# Network settings
httpTimeout: 60000
networkConcurrency: 8

# Prefer workspace dependencies
preferWorkspacePackages: true
